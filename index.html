<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Fit Memory Allocation</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #333;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 400px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
        width: 90%;
        padding: 8px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    table {
        margin-top: 20px;
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 8px;
    }

    th {
        background: #007bff;
        color: white;
    }
</style>
</head>

<body>

<h1>Best Fit Memory Allocation</h1>

<div class="container">

    <label>Enter Memory Blocks (comma separated):</label>
    <input type="text" id="blocks" placeholder="e.g. 100,500,200,300,600">

    <label>Enter Process Sizes (comma separated):</label>
    <input type="text" id="processes" placeholder="e.g. 212,417,112,426">

    <button onclick="bestFit()">Allocate Memory</button>

    <div id="result"></div>

</div>

<script>
function bestFit() {
    let blocks = document.getElementById("blocks").value.split(',').map(Number);
    let processes = document.getElementById("processes").value.split(',').map(Number);

    let allocation = new Array(processes.length).fill(-1);

    for (let i = 0; i < processes.length; i++) {
        let bestIndex = -1;

        for (let j = 0; j < blocks.length; j++) {
            if (blocks[j] >= processes[i]) {
                if (bestIndex === -1 || blocks[j] < blocks[bestIndex]) {
                    bestIndex = j;
                }
            }
        }

        if (bestIndex !== -1) {
            allocation[i] = bestIndex;
            blocks[bestIndex] -= processes[i];
        }
    }

    let output = "<table>";
    output += "<tr><th>Process No</th><th>Process Size</th><th>Block No</th></tr>";

    for (let i = 0; i < processes.length; i++) {
        if (allocation[i] !== -1) {
            output += `<tr>
                        <td>${i+1}</td>
                        <td>${processes[i]}</td>
                        <td>${allocation[i]+1}</td>
                      </tr>`;
        } else {
            output += `<tr>
                        <td>${i+1}</td>
                        <td>${processes[i]}</td>
                        <td>Not Allocated</td>
                      </tr>`;
        }
    }

    output += "</table>";

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
